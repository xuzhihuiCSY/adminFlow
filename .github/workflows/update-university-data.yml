name: Update university data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 1 * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Update catalog data
        run: python scripts/update_university_data.py

      - name: Audit deadlines and links
        run: python scripts/audit_program_data.py

      - name: Commit data changes
        shell: bash
        run: |
          if git diff --quiet -- data/*.json; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git commit -m "Update university data"
          git push
